<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Network Latency Matrix</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #252536;
    --text: #cdd6f4;
    --border: #45475a;
    --accent: #89b4fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 4px;
    color: #89b4fa;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #a6adc8;
    margin-bottom: 16px;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
    margin-bottom: 14px;
    background: var(--surface);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-group label {
    font-size: 0.75rem;
    color: #a6adc8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .controls select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 0.85rem;
    min-width: 170px;
  }
  /* Multi-select dropdown */
  .ms-wrap {
    position: relative;
    min-width: 200px;
  }
  .ms-toggle {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 28px 5px 8px;
    font-size: 0.83rem;
    cursor: pointer;
    width: 100%;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    min-height: 30px;
  }
  .ms-toggle::after {
    content: '▾';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    color: #a6adc8;
  }
  .ms-toggle:hover { border-color: var(--accent); }
  .ms-panel {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    min-width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0 0 6px 6px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    max-height: 320px;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }
  .ms-panel.open { display: flex; }
  .ms-search {
    background: var(--surface);
    color: var(--text);
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 7px 10px;
    font-size: 0.83rem;
    outline: none;
    width: 100%;
  }
  .ms-search::placeholder { color: #585b70; }
  .ms-actions {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .ms-actions button {
    flex: 1;
    background: transparent;
    color: var(--accent);
    border: none;
    padding: 5px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .ms-actions button:hover { background: #313244; }
  .ms-list {
    overflow-y: auto;
    max-height: 240px;
    padding: 2px 0;
  }
  .ms-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    user-select: none;
  }
  .ms-item:hover { background: #313244; }
  .ms-item input[type="checkbox"] {
    accent-color: var(--accent);
    cursor: pointer;
  }
  .ms-item.hidden { display: none; }
  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-left: auto;
    font-size: 0.8rem;
  }
  .export-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .export-btn:hover { background: rgba(137,180,250,.15); }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: inline-block;
  }
  .table-wrap {
    overflow: auto;
    max-height: calc(100vh - 160px);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  table {
    border-collapse: collapse;
    font-size: 0.75rem;
    white-space: nowrap;
  }
  th, td {
    padding: 4px 7px;
    border: 1px solid #313244;
    text-align: center;
    min-width: 38px;
  }
  thead th {
    background: #313244;
    color: #cdd6f4;
    position: sticky;
    top: 0;
    z-index: 2;
    font-weight: 600;
  }
  thead th.corner {
    z-index: 3;
    left: 0;
  }
  /* rotated column headers */
  thead th:not(.corner) {
    writing-mode: vertical-lr;
    text-orientation: mixed;
    transform: rotate(180deg);
    height: 140px;
    vertical-align: bottom;
    font-weight: 500;
    letter-spacing: -0.2px;
  }
  tbody th {
    background: #313244;
    color: #cdd6f4;
    position: sticky;
    left: 0;
    z-index: 1;
    text-align: left;
    font-weight: 500;
    min-width: 150px;
  }
  tbody tr:hover th {
    background: #45475a;
  }
  tbody tr:hover td {
    filter: brightness(1.15);
  }
  td.empty {
    background: #1e1e2e;
    color: #45475a;
  }
  /* color bands */
  td.lat-green  { background: #1a5c2a; color: #a6e3a1; font-weight: 700; }
  td.lat-yellow { background: #5c5c1a; color: #f9e2af; }
  td.lat-orange { background: #6c3a0a; color: #fab387; }
  td.lat-red    { background: #6c1a1a; color: #f38ba8; }
  td.lat-darkred{ background: #4c0a0a; color: #e06080; }

  .stats {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #a6adc8;
  }
  #loading {
    padding: 40px;
    text-align: center;
    font-size: 1.1rem;
    color: #a6adc8;
  }
  #error {
    padding: 20px;
    text-align: center;
    color: #f38ba8;
    display: none;
  }
  /* History chart tooltip */
  #chartTip {
    display: none;
    position: fixed;
    z-index: 200;
    background: #1e1e2e;
    border: 1px solid #585b70;
    border-radius: 8px;
    padding: 10px 12px 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    pointer-events: none;
  }
  #chartTip .ct-title {
    font-size: 0.8rem;
    color: #89b4fa;
    margin-bottom: 2px;
    font-weight: 600;
  }
  #chartTip .ct-subtitle {
    font-size: 0.7rem;
    color: #a6adc8;
    margin-bottom: 6px;
  }
  #chartTip canvas {
    border-radius: 4px;
  }
  /* Region info tooltip */
  #regionTip {
    display: none;
    position: fixed;
    z-index: 200;
    background: #1e1e2e;
    border: 1px solid #585b70;
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    pointer-events: none;
    max-width: 280px;
  }
  #regionTip .rt-name {
    font-size: 0.85rem;
    color: #89b4fa;
    font-weight: 600;
    margin-bottom: 4px;
  }
  #regionTip .rt-row {
    font-size: 0.78rem;
    color: #cdd6f4;
    line-height: 1.5;
  }
  #regionTip .rt-row span {
    color: #a6adc8;
  }
  #regionTip .rt-restricted {
    font-size: 0.72rem;
    color: #fab387;
    margin-top: 4px;
  }
</style>

<script>
const API_URL = 'https://func-latency-api-001.azurewebsites.net/api/latency';

// Region internal name to display name
const DISPLAY_NAMES = {
  australiaeast: 'Australia East', australiasoutheast: 'Australia Southeast',
  austriaeast: 'Austria East', belgiumcentral: 'Belgium Central',
  brazilsouth: 'Brazil South', canadacentral: 'Canada Central', canadaeast: 'Canada East',
  centralindia: 'Central India', centralus: 'Central US',
  chilecentral: 'Chile Central', eastasia: 'East Asia',
  eastus: 'East US', eastus2: 'East US 2',
  francecentral: 'France Central', germanywestcentral: 'Germany West Central',
  indonesiacentral: 'Indonesia Central', israelcentral: 'Israel Central',
  italynorth: 'Italy North', japaneast: 'Japan East', japanwest: 'Japan West',
  koreacentral: 'Korea Central', koreasouth: 'Korea South',
  malaysiawest: 'Malaysia West', mexicocentral: 'Mexico Central',
  newzealandnorth: 'New Zealand North', northcentralus: 'North Central US',
  northeurope: 'North Europe', norwayeast: 'Norway East',
  polandcentral: 'Poland Central', qatarcentral: 'Qatar Central',
  southafricanorth: 'South Africa North', southcentralus: 'South Central US',
  southeastasia: 'Southeast Asia', southindia: 'South India',
  spaincentral: 'Spain Central', swedencentral: 'Sweden Central',
  switzerlandnorth: 'Switzerland North', uaenorth: 'UAE North',
  uksouth: 'UK South', ukwest: 'UK West',
  westcentralus: 'West Central US', westeurope: 'West Europe',
  westindia: 'West India', westus: 'West US', westus2: 'West US 2', westus3: 'West US 3'
};
function displayName(id) { return DISPLAY_NAMES[id] || id; }

// Geography mapping (display names)
const GEO = {
  'Americas': [
    'East US','East US 2','Central US','North Central US','South Central US',
    'West Central US','West US','West US 2','West US 3',
    'Canada Central','Canada East','Brazil South','Mexico Central','Chile Central'
  ],
  'Europe': [
    'North Europe','West Europe','UK South','UK West',
    'France Central','Germany West Central',
    'Switzerland North','Norway East',
    'Sweden Central','Poland Central','Italy North',
    'Austria East','Belgium Central','Spain Central'
  ],
  'Asia Pacific': [
    'East Asia','Southeast Asia','Australia East','Australia Southeast',
    'Japan East','Japan West',
    'Korea Central','Korea South','Central India','South India','West India',
    'Indonesia Central','Malaysia West','New Zealand North'
  ],
  'Middle East & Africa': [
    'UAE North','Qatar Central','Israel Central',
    'South Africa North'
  ]
};

// Parse API JSON into matrix format
function parseAPI(records) {
  // Group by (source, dest), keep latest measurement + build history
  const latest = {};
  const history = {};
  for (const r of records) {
    const key = r.source + '|' + r.destination;
    if (!latest[key] || r.timestamp > latest[key].timestamp) {
      latest[key] = r;
    }
    if (!history[key]) history[key] = [];
    const num = parseFloat(r.latency);
    if (!isNaN(num)) {
      history[key].push({ ts: new Date(r.timestamp), ms: num });
    }
  }
  // Sort history by time
  for (const k in history) history[k].sort((a, b) => a.ts - b.ts);

  // Collect all regions
  const regionSet = new Set();
  for (const r of Object.values(latest)) {
    regionSet.add(r.source);
    regionSet.add(r.destination);
  }
  const regionIds = [...regionSet].sort();
  const destinations = regionIds.map(displayName);

  // Build reverse lookup: display name → internal id
  const toInternal = {};
  regionIds.forEach(id => toInternal[displayName(id)] = id);

  // Build rows
  const rows = regionIds.map(srcId => {
    const values = regionIds.map(dstId => {
      if (srcId === dstId) return null;
      const rec = latest[srcId + '|' + dstId];
      if (!rec) return null;
      const num = parseFloat(rec.latency);
      return isNaN(num) ? null : Math.round(num);
    });
    return { source: displayName(srcId), values };
  });

  // Date range
  const timestamps = Object.values(latest).map(r => r.timestamp).sort();
  const earliest = timestamps[0] ? timestamps[0].slice(0, 10) : '?';
  const latestTs = timestamps.length ? timestamps[timestamps.length - 1].slice(0, 10) : '?';

  return { destinations, rows, history, toInternal, dateRange: { earliest, latest: latestTs }, count: records.length, pairs: Object.keys(latest).length };
}

function latencyClass(v) {
  if (v === null) return 'empty';
  if (v < 40)  return 'lat-green';
  if (v < 100) return 'lat-yellow';
  if (v < 200) return 'lat-orange';
  if (v < 300) return 'lat-red';
  return 'lat-darkred';
}

// --- Multi-select component ---
function createMultiSelect(toggleEl, panelEl, searchEl, listEl, allBtn, noneBtn, onChange) {
  let items = [];
  let selected = new Set();

  function populate(options, preselect) {
    items = options;
    selected = preselect ? new Set(preselect) : new Set(options);
    renderList();
    updateLabel();
  }

  function renderList() {
    const q = searchEl.value.toLowerCase();
    listEl.innerHTML = '';
    items.forEach(name => {
      const hidden = q && !name.toLowerCase().includes(q);
      const div = document.createElement('div');
      div.className = 'ms-item' + (hidden ? ' hidden' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selected.has(name);
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(name); else selected.delete(name);
        updateLabel();
        onChange();
      });
      const span = document.createElement('span');
      span.textContent = name;
      div.appendChild(cb);
      div.appendChild(span);
      div.addEventListener('click', e => { if (e.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } });
      listEl.appendChild(div);
    });
  }

  function updateLabel() {
    if (selected.size === 0) toggleEl.textContent = 'None selected';
    else if (selected.size === items.length) toggleEl.textContent = 'All regions';
    else if (selected.size <= 2) toggleEl.textContent = [...selected].join(', ');
    else toggleEl.textContent = selected.size + ' of ' + items.length + ' regions';
  }

  function getSelected() {
    return selected;
  }

  toggleEl.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.ms-panel.open').forEach(p => { if (p !== panelEl) p.classList.remove('open'); });
    panelEl.classList.toggle('open');
    if (panelEl.classList.contains('open')) searchEl.focus();
  });

  searchEl.addEventListener('input', renderList);
  allBtn.addEventListener('click', () => { items.forEach(n => selected.add(n)); renderList(); updateLabel(); onChange(); });
  noneBtn.addEventListener('click', () => { selected.clear(); renderList(); updateLabel(); onChange(); });

  return { populate, getSelected, getItems: () => items };
}

// Close panels on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
  }
});

function avgLatency(row, destIndices) {
  let sum = 0, count = 0;
  for (const di of destIndices) {
    const v = row.values[di];
    if (v !== null) { sum += v; count++; }
  }
  return count > 0 ? sum / count : Infinity;
}

function render(data, srcSet, destSet, sortBy) {
  const { destinations, rows } = data;

  let filtered = srcSet.size > 0 ? rows.filter(r => srcSet.has(r.source)) : [];
  let destIndices = destinations.map((d, i) => ({ d, i })).filter(x => destSet.has(x.d)).map(x => x.i);

  // Sort rows
  if (sortBy === 'name') {
    filtered = [...filtered].sort((a, b) => a.source.localeCompare(b.source));
  } else if (sortBy === 'name-desc') {
    filtered = [...filtered].sort((a, b) => b.source.localeCompare(a.source));
  } else if (sortBy === 'latency') {
    filtered = [...filtered].sort((a, b) => avgLatency(a, destIndices) - avgLatency(b, destIndices));
  } else if (sortBy === 'latency-desc') {
    filtered = [...filtered].sort((a, b) => avgLatency(b, destIndices) - avgLatency(a, destIndices));
  }

  // Sort destination columns
  if (sortBy === 'latency' || sortBy === 'latency-desc') {
    const dir = sortBy === 'latency' ? 1 : -1;
    destIndices = [...destIndices].sort((a, b) => {
      let sumA = 0, cA = 0, sumB = 0, cB = 0;
      for (const row of filtered) {
        const va = row.values[a]; if (va !== null) { sumA += va; cA++; }
        const vb = row.values[b]; if (vb !== null) { sumB += vb; cB++; }
      }
      return dir * ((cA ? sumA/cA : Infinity) - (cB ? sumB/cB : Infinity));
    });
  } else {
    destIndices = [...destIndices].sort((a, b) =>
      sortBy === 'name-desc'
        ? destinations[b].localeCompare(destinations[a])
        : destinations[a].localeCompare(destinations[b])
    );
  }

  // Build table
  let html = '<table><thead><tr><th class="corner">Source &#8594; Dest</th>';
  for (const di of destIndices) html += '<th>' + destinations[di] + '</th>';
  html += '</tr></thead><tbody>';

  for (const row of filtered) {
    html += '<tr><th>' + row.source + '</th>';
    for (const di of destIndices) {
      const v = row.values[di];
      const cls = latencyClass(v);
      const display = v === null ? '\u2014' : v;
      html += '<td class="' + cls + '" data-src="' + row.source + '" data-dst="' + destinations[di] + '">' + display + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  document.getElementById('tableWrap').innerHTML = html;
  document.getElementById('stats').textContent =
    'Showing ' + filtered.length + ' source region' + (filtered.length !== 1 ? 's' : '') + ' \u00d7 ' + destIndices.length + ' destinations';

  // Store for CSV export
  window._lastRender = { filtered, destIndices, destinations };
}

function exportCSV() {
  const { filtered, destIndices, destinations } = window._lastRender || {};
  if (!filtered || !filtered.length) return;
  let csv = 'Source,' + destIndices.map(di => destinations[di]).join(',') + '\n';
  for (const row of filtered) {
    csv += row.source;
    for (const di of destIndices) {
      csv += ',' + (row.values[di] === null ? '' : row.values[di]);
    }
    csv += '\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'azure-latency-matrix.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- History chart tooltip ---
const chartTip = document.getElementById('chartTip');
const ctTitle = document.getElementById('ctTitle');
const ctSubtitle = document.getElementById('ctSubtitle');
const ctCanvas = document.getElementById('ctCanvas');
let chartTimer = null;

function drawChart(points) {
  const W = ctCanvas.width, H = ctCanvas.height;
  const ctx = ctCanvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (points.length < 2) {
    ctx.fillStyle = '#585b70';
    ctx.font = '12px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Not enough data', W / 2, H / 2);
    return;
  }

  const pad = { t: 8, r: 10, b: 22, l: 36 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  const vals = points.map(p => p.ms);
  let minV = 0, maxV = Math.max(...vals);
  if (minV === maxV) { minV -= 5; maxV += 5; }
  const minT = points[0].ts.getTime(), maxT = points[points.length - 1].ts.getTime();
  const rangeT = maxT - minT || 1;

  function x(t) { return pad.l + ((t.getTime() - minT) / rangeT) * cw; }
  function y(v) { return pad.t + ch - ((v - minV) / (maxV - minV)) * ch; }

  // Grid lines
  ctx.strokeStyle = '#313244';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const gy = pad.t + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(W - pad.r, gy); ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle = '#585b70';
  ctx.font = '9px Segoe UI';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 3; i++) {
    const v = maxV - ((maxV - minV) / 3) * i;
    ctx.fillText(Math.round(v), pad.l - 4, pad.t + (ch / 3) * i + 3);
  }

  // X-axis labels (first and last date)
  ctx.textAlign = 'left';
  ctx.fillText(points[0].ts.toLocaleDateString('en', { month: 'short', day: 'numeric' }), pad.l, H - 4);
  ctx.textAlign = 'right';
  ctx.fillText(points[points.length - 1].ts.toLocaleDateString('en', { month: 'short', day: 'numeric' }), W - pad.r, H - 4);

  // Line
  ctx.strokeStyle = '#89b4fa';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(x(p.ts), y(p.ms));
    else ctx.lineTo(x(p.ts), y(p.ms));
  });
  ctx.stroke();

  // Fill under line
  ctx.lineTo(x(points[points.length - 1].ts), pad.t + ch);
  ctx.lineTo(x(points[0].ts), pad.t + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(137,180,250,.1)';
  ctx.fill();

  // Dots
  ctx.fillStyle = '#89b4fa';
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(x(p.ts), y(p.ms), 2, 0, Math.PI * 2);
    ctx.fill();
  });
}

function showChart(cell, srcName, dstName) {
  if (!data || !data.history || !data.toInternal) return;
  const srcId = data.toInternal[srcName];
  const dstId = data.toInternal[dstName];
  if (!srcId || !dstId) return;
  const points = data.history[srcId + '|' + dstId];
  if (!points || points.length === 0) return;

  ctTitle.textContent = srcName + ' \u2192 ' + dstName;
  const avg = points.reduce((s, p) => s + p.ms, 0) / points.length;
  ctSubtitle.textContent = points.length + ' measurements \u00b7 avg ' + avg.toFixed(1) + ' ms';
  drawChart(points);

  // Position near cell
  const rect = cell.getBoundingClientRect();
  let left = rect.right + 8;
  let top = rect.top - 40;
  // Keep on screen
  if (left + 310 > window.innerWidth) left = rect.left - 310;
  if (top + 180 > window.innerHeight) top = window.innerHeight - 185;
  if (top < 5) top = 5;

  chartTip.style.left = left + 'px';
  chartTip.style.top = top + 'px';
  chartTip.style.display = 'block';
}

function hideChart() {
  chartTip.style.display = 'none';
}

  document.getElementById('srcSearch'), document.getElementById('srcList'),
  document.getElementById('srcAll'), document.getElementById('srcNone'),
  update
);

const destMS = createMultiSelect(
  document.getElementById('destToggle'), document.getElementById('destPanel'),
  document.getElementById('destSearch'), document.getElementById('destList'),
  document.getElementById('destAll'), document.getElementById('destNone'),
  update
);

// Read URL params
const params = new URLSearchParams(window.location.search);
const initGeo = params.get('geo') || '__all__';
const initSrc = params.get('source') ? params.get('source').split(',') : null;
const initDest = params.get('dest') ? params.get('dest').split(',') : null;
const initSort = params.get('sort') || 'name';

if ([...geoSel.options].some(o => o.value === initGeo)) geoSel.value = initGeo;
if ([...sortSel.options].some(o => o.value === initSort)) sortSel.value = initSort;

let data = null;

function rebuildDropdowns(preselectSrc, preselectDest) {
  if (!data) return;
  const geo = geoSel.value;
  const geoSet = geo !== '__all__' ? new Set(GEO[geo] || []) : null;
  const srcRegions = data.rows.map(r => r.source).filter(r => !geoSet || geoSet.has(r));
  const destRegions = data.destinations.filter(d => !geoSet || geoSet.has(d));
  srcMS.populate(srcRegions, preselectSrc);
  destMS.populate(destRegions, preselectDest);
}

function syncURL() {
  const url = new URL(window.location);
  const g = geoSel.value;
  const s = sortSel.value;
  const srcSel = srcMS.getSelected();
  const dstSel = destMS.getSelected();
  const srcAll = srcSel.size === srcMS.getItems().length;
  const dstAll = dstSel.size === destMS.getItems().length;
  if (g !== '__all__') url.searchParams.set('geo', g); else url.searchParams.delete('geo');
  if (!srcAll) url.searchParams.set('source', [...srcSel].join(',')); else url.searchParams.delete('source');
  if (!dstAll) url.searchParams.set('dest', [...dstSel].join(',')); else url.searchParams.delete('dest');
  if (s !== 'name') url.searchParams.set('sort', s); else url.searchParams.delete('sort');
  history.replaceState(null, '', url);
}

function update() {
  if (!data) return;
  render(data, srcMS.getSelected(), destMS.getSelected(), sortSel.value);
  syncURL();
}

geoSel.addEventListener('change', () => {
  rebuildDropdowns(null, null);
  update();
});
sortSel.addEventListener('change', update);
document.getElementById('exportCSV').addEventListener('click', exportCSV);

// Fetch data from API
fetch(API_URL)
  .then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(records => {
    data = parseAPI(records);

    // Update subtitle with data info
    document.getElementById('subtitle').innerHTML =
      'Round-trip latency in ms &middot; ' +
      data.rows.length + ' regions, ' + data.pairs + ' pairs &middot; ' +
      'Data: ' + data.dateRange.earliest + ' to ' + data.dateRange.latest + ' &middot; ' +
      '<a href="https://learn.microsoft.com/en-us/azure/networking/azure-network-latency" target="_blank" style="color:#89b4fa">MS Docs</a>' +
      ' &middot; <a href="https://github.com/iakov-gan/azure-latency-matrix" target="_blank" style="color:#89b4fa">GitHub</a>';

    rebuildDropdowns(initSrc, initDest);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('tableWrap').style.display = '';
    update();
  })
  .catch(err => {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.textContent = 'Failed to load latency data: ' + err.message + '. Please refresh to try again.';
  });
</script>
